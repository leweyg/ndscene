<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ndscene viewcore</title>
    <style>
      :root {
        --page-sky: #d7ebe5;
        --page-ground: #f4efe5;
        --panel-bg: rgba(255, 251, 245, 0.88);
        --panel-border: rgba(78, 64, 45, 0.12);
        --panel-shadow: rgba(56, 46, 29, 0.12);
        --text-main: #2f271c;
        --text-muted: #665a49;
        --accent: #8f5f24;
        --accent-soft: #ede0c9;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.82), transparent 28rem),
          linear-gradient(180deg, var(--page-sky) 0%, var(--page-ground) 100%);
        color: var(--text-main);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #viewport {
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      .hud {
        position: absolute;
        top: 1rem;
        left: 1rem;
        right: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        pointer-events: none;
      }

      .panel {
        max-width: min(34rem, calc(100vw - 2rem));
        padding: 0.95rem 1rem;
        border: 1px solid var(--panel-border);
        border-radius: 1rem;
        background: var(--panel-bg);
        box-shadow: 0 0.8rem 2.2rem var(--panel-shadow);
        backdrop-filter: blur(10px);
        pointer-events: auto;
      }

      .panel h1 {
        margin: 0;
        font-size: clamp(1.25rem, 2.2vw, 1.8rem);
        line-height: 1.1;
        letter-spacing: -0.03em;
      }

      .panel p {
        margin: 0.45rem 0 0;
        color: var(--text-muted);
        line-height: 1.45;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        margin-top: 0.8rem;
      }

      .timeline {
        margin-top: 0.95rem;
      }

      .timeline-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 0.8rem;
        margin-bottom: 0.45rem;
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      .timeline-head strong {
        color: var(--text-main);
      }

      .timeline input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .chip {
        padding: 0.35rem 0.65rem;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--text-main);
        font-size: 0.9rem;
        white-space: nowrap;
      }

      .actions {
        display: flex;
        gap: 0.6rem;
        align-items: center;
      }

      button {
        padding: 0.72rem 0.95rem;
        border: 0;
        border-radius: 0.85rem;
        background: linear-gradient(180deg, #a76d2c 0%, #89531c 100%);
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: linear-gradient(180deg, #86958d 0%, #5e6d64 100%);
      }

      #status[data-state="error"] {
        color: #7c251d;
      }

      #status[data-state="ready"] {
        color: #1e5d3e;
      }

      @media (max-width: 900px) {
        .hud {
          flex-direction: column;
          align-items: stretch;
        }

        .actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="viewport"></div>
      <div class="hud">
        <section class="panel">
          <h1>ndscene viewcore</h1>
          <p id="status" data-state="loading">Loading timeline commits...</p>
          <div class="meta">
            <div class="chip" id="scene-path">timeline: views 1, 2, 3</div>
            <div class="chip" id="scene-stats">waiting for scene</div>
            <div class="chip">drag to orbit</div>
            <div class="chip">wheel or pinch to zoom</div>
          </div>
          <div class="timeline">
            <div class="timeline-head">
              <strong>Timeline</strong>
              <span id="commit-label">waiting for commits</span>
            </div>
            <input type="range" id="commit-slider" min="0" max="0" step="1" value="0" disabled>
          </div>
        </section>
        <section class="panel actions">
          <button type="button" id="reset-view">Reset View</button>
          <button type="button" class="secondary" id="frame-scene">Frame Scene</button>
        </section>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "flatbuffers": "../../js/node_modules/flatbuffers/index.js"
        }
      }
    </script>
    <script src="../ctscan/three.js"></script>
    <script type="module">
      import { NDSceneRuntime } from "../../js/ndsceneRuntime.js";
      import {
        runtimeFromLegacyJsonSequence,
      } from "../../js/ndsceneLegacyJson.js";

      const THREE = window.THREE;
      const SCENE_SOURCES = [
        {
          url: "../../json/freed_go/view_1_scene.json",
          commitId: "freed_go_view_1",
          label: "View 1",
          createdAt: "2026-04-22T00:00:00.000Z",
        },
        {
          url: "../../json/freed_go/view_2_scene.json",
          commitId: "freed_go_view_2",
          label: "View 2",
          createdAt: "2026-04-22T00:00:01.000Z",
        },
        {
          url: "../../json/freed_go/view_3_scene.json",
          commitId: "freed_go_view_3",
          label: "View 3",
          createdAt: "2026-04-22T00:00:02.000Z",
        },
      ];
      const sceneResourceUrlByCommitId = new Map(
        SCENE_SOURCES.map((source) => [source.commitId, new URL(source.url, window.location.href)]),
      );
      const sceneSourceByCommitId = new Map(
        SCENE_SOURCES.map((source) => [source.commitId, source]),
      );

      if (!THREE) {
        throw new Error("THREE was not loaded before the viewcore module ran.");
      }

      const viewport = document.getElementById("viewport");
      const scenePathElement = document.getElementById("scene-path");
      const statusElement = document.getElementById("status");
      const sceneStatsElement = document.getElementById("scene-stats");
      const commitLabelElement = document.getElementById("commit-label");
      const commitSliderElement = document.getElementById("commit-slider");
      const resetViewButton = document.getElementById("reset-view");
      const frameSceneButton = document.getElementById("frame-scene");

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(viewport.clientWidth || window.innerWidth, viewport.clientHeight || window.innerHeight);
      viewport.appendChild(renderer.domElement);
      const textureLoader = new THREE.TextureLoader();

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xddeae4);
      scene.fog = new THREE.Fog(0xddeae4, 110, 280);

      const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 2000);
      camera.up.set(0, 1, 0);

      const ambientLight = new THREE.HemisphereLight(0xfaf4ea, 0x879283, 1.15);
      const sunLight = new THREE.DirectionalLight(0xfff5df, 1.1);
      sunLight.position.set(60, 90, 40);
      scene.add(ambientLight, sunLight);

      const worldRoot = new THREE.Group();
      worldRoot.name = "worldRoot";
      scene.add(worldRoot);

      const surfaceGroup = new THREE.Group();
      surfaceGroup.name = "surfaceDecor";
      scene.add(surfaceGroup);

      let controls = null;
      let initialViewState = null;
      let sceneBounds = new THREE.Box3(new THREE.Vector3(-10, -10, -10), new THREE.Vector3(10, 10, 10));
      let sceneCenter = new THREE.Vector3();
      let sceneRadius = 25;
      let activeRuntime = null;
      let activeBufferBytes = null;
      let activeRenderToken = 0;

      class BasicOrbitControls {
        constructor(cameraRef, domElement, onChange) {
          this.camera = cameraRef;
          this.domElement = domElement;
          this.onChange = onChange;
          this.target = new THREE.Vector3();
          this.spherical = new THREE.Spherical(10, Math.PI / 2, 0);
          this.minDistance = 4;
          this.maxDistance = 600;
          this.rotateSpeed = 0.008;
          this.zoomSpeed = 0.0016;
          this.panSpeed = 0.018;
          this.pointerState = null;
          this.lastX = 0;
          this.lastY = 0;
          this.touchState = null;
          this.bindEvents();
        }

        bindEvents() {
          this.domElement.addEventListener("mousedown", (event) => this.onMouseDown(event));
          this.domElement.addEventListener("mousemove", (event) => this.onMouseMove(event));
          window.addEventListener("mouseup", () => this.onMouseUp());
          this.domElement.addEventListener("wheel", (event) => this.onWheel(event), { passive: false });
          this.domElement.addEventListener("contextmenu", (event) => event.preventDefault());
          this.domElement.addEventListener("touchstart", (event) => this.onTouchStart(event), { passive: false });
          this.domElement.addEventListener("touchmove", (event) => this.onTouchMove(event), { passive: false });
          this.domElement.addEventListener("touchend", () => this.onTouchEnd());
          this.domElement.addEventListener("touchcancel", () => this.onTouchEnd());
        }

        syncFromCamera() {
          const offset = this.camera.position.clone().sub(this.target);
          if (offset.lengthSq() < 1e-8) {
            offset.set(0, 0, 1);
          }
          this.spherical.setFromVector3(offset);
          this.spherical.makeSafe();
        }

        updateCamera() {
          this.spherical.radius = clamp(this.spherical.radius, this.minDistance, this.maxDistance);
          this.spherical.makeSafe();
          const offset = new THREE.Vector3().setFromSpherical(this.spherical);
          this.camera.position.copy(this.target).add(offset);
          this.camera.lookAt(this.target);
          this.onChange();
        }

        setView(position, target) {
          this.camera.position.copy(position);
          this.target.copy(target);
          this.syncFromCamera();
          this.updateCamera();
        }

        pan(deltaX, deltaY) {
          const distance = Math.max(this.camera.position.distanceTo(this.target), 1);
          const panScale = distance * this.panSpeed;
          const forward = this.target.clone().sub(this.camera.position).normalize();
          const right = new THREE.Vector3().crossVectors(forward, this.camera.up).normalize();
          const up = new THREE.Vector3().copy(this.camera.up).normalize();
          const offset = right.multiplyScalar(-deltaX * panScale).add(up.multiplyScalar(deltaY * panScale));
          this.camera.position.add(offset);
          this.target.add(offset);
          this.syncFromCamera();
          this.updateCamera();
        }

        onMouseDown(event) {
          event.preventDefault();
          this.pointerState = event.button === 2 || event.button === 1 || event.shiftKey ? "pan" : "rotate";
          this.lastX = event.clientX;
          this.lastY = event.clientY;
        }

        onMouseMove(event) {
          if (!this.pointerState) {
            return;
          }
          const deltaX = event.clientX - this.lastX;
          const deltaY = event.clientY - this.lastY;
          this.lastX = event.clientX;
          this.lastY = event.clientY;

          if (this.pointerState === "rotate") {
            this.spherical.theta -= deltaX * this.rotateSpeed;
            this.spherical.phi -= deltaY * this.rotateSpeed;
            this.updateCamera();
            return;
          }

          this.pan(deltaX / 100, -deltaY / 100);
        }

        onMouseUp() {
          this.pointerState = null;
        }

        onWheel(event) {
          event.preventDefault();
          const zoomFactor = Math.exp(event.deltaY * this.zoomSpeed);
          this.spherical.radius *= zoomFactor;
          this.updateCamera();
        }

        onTouchStart(event) {
          event.preventDefault();
          if (event.touches.length === 1) {
            this.touchState = {
              type: "rotate",
              x: event.touches[0].clientX,
              y: event.touches[0].clientY,
            };
            return;
          }

          if (event.touches.length >= 2) {
            this.touchState = createPinchState(event.touches);
          }
        }

        onTouchMove(event) {
          event.preventDefault();
          if (!this.touchState) {
            return;
          }

          if (event.touches.length === 1 && this.touchState.type === "rotate") {
            const touch = event.touches[0];
            const deltaX = touch.clientX - this.touchState.x;
            const deltaY = touch.clientY - this.touchState.y;
            this.touchState.x = touch.clientX;
            this.touchState.y = touch.clientY;
            this.spherical.theta -= deltaX * this.rotateSpeed;
            this.spherical.phi -= deltaY * this.rotateSpeed;
            this.updateCamera();
            return;
          }

          if (event.touches.length >= 2) {
            const nextState = createPinchState(event.touches);
            if (this.touchState.type === "pinch") {
              const distanceRatio = this.touchState.distance / Math.max(nextState.distance, 1);
              this.spherical.radius *= distanceRatio;
              this.updateCamera();
              this.pan(
                (nextState.centerX - this.touchState.centerX) / 180,
                -(nextState.centerY - this.touchState.centerY) / 180,
              );
            }
            this.touchState = nextState;
          }
        }

        onTouchEnd() {
          this.touchState = null;
        }
      }

      function createPinchState(touches) {
        const first = touches[0];
        const second = touches[1];
        const dx = second.clientX - first.clientX;
        const dy = second.clientY - first.clientY;
        return {
          type: "pinch",
          distance: Math.hypot(dx, dy),
          centerX: (first.clientX + second.clientX) * 0.5,
          centerY: (first.clientY + second.clientY) * 0.5,
        };
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function clearObjectChildren(object3D) {
        while (object3D.children.length > 0) {
          object3D.remove(object3D.children[0]);
        }
      }

      function setStatus(message, state) {
        statusElement.textContent = message;
        statusElement.dataset.state = state;
      }

      function readTensorNumbers(tensor) {
        if (!tensor || typeof tensor.denseNumbers !== "function") {
          return [];
        }
        return tensor.denseNumbers();
      }

      function readTensorString(tensor) {
        if (!tensor || typeof tensor.scalarString !== "function") {
          return undefined;
        }
        return tensor.scalarString();
      }

      function readTensorBufferPath(tensor) {
        if (!tensor || typeof tensor.bufferPath !== "function") {
          return undefined;
        }
        return tensor.bufferPath();
      }

      function matrixFromRuntimePose(poseValue) {
        const matrix = new THREE.Matrix4();
        if (!poseValue) {
          return matrix.identity();
        }

        const data = readTensorNumbers(poseValue);
        if (data.length !== 16) {
          return matrix.identity();
        }
        return matrix.fromArray(data);
      }

      function applyPose(object3D, poseValue) {
        const matrix = matrixFromRuntimePose(poseValue);
        matrix.decompose(object3D.position, object3D.quaternion, object3D.scale);
      }

      function resolveSceneBufferUrl(buffer) {
        const baseUrl = sceneResourceUrlByCommitId.get(buffer.commitId) || window.location.href;
        return new URL(buffer.path, baseUrl).href;
      }

      function applyTextureColorSpace(texture) {
        if ("colorSpace" in texture && THREE.SRGBColorSpace) {
          texture.colorSpace = THREE.SRGBColorSpace;
          return;
        }
        if ("encoding" in texture && THREE.sRGBEncoding) {
          texture.encoding = THREE.sRGBEncoding;
        }
      }

      function loadTextureFromSceneBuffer(buffer) {
        return new Promise((resolve, reject) => {
          const blobUrl = buffer.dataEncoded && buffer.dataEncoded.length > 0
            ? URL.createObjectURL(new Blob([buffer.dataEncoded], { type: buffer.format || "application/octet-stream" }))
            : null;
          const textureUrl = blobUrl ?? resolveSceneBufferUrl(buffer);
          textureLoader.load(
            textureUrl,
            (texture) => {
              applyTextureColorSpace(texture);
              if (blobUrl) {
                URL.revokeObjectURL(blobUrl);
              }
              resolve(texture);
            },
            undefined,
            (error) => {
              if (blobUrl) {
                URL.revokeObjectURL(blobUrl);
              }
              reject(error instanceof Error ? error : new Error(`Unable to load texture ${buffer.path}`));
            },
          );
        });
      }

      function extractProjectionMetrics(projectionMatrix) {
        const projectionElements = projectionMatrix.elements;
        const xScale = Math.abs(projectionElements[0]) || 1;
        const yScale = Math.abs(projectionElements[5]) || 1;
        const fov = (2 * Math.atan(1 / yScale) * 180) / Math.PI;
        const near = Math.abs((projectionElements[14] || -0.2) / ((projectionElements[10] || -1.2) - 1)) || 0.1;
        const far = Math.abs((projectionElements[14] || -200) / ((projectionElements[10] || -1.2) + 1)) || 1000;
        return {
          projectionElements,
          xScale,
          yScale,
          fov: clamp(fov, 10, 140),
          near: clamp(near, 0.01, 100),
          far: clamp(far, 10, 100000),
        };
      }

      function createImageProjection(texture, lensNode, imageNode) {
        const projectionMatrix = lensNode ? matrixFromRuntimePose(lensNode.edge.unpose) : new THREE.Matrix4();
        const projection = extractProjectionMetrics(projectionMatrix);
        const imageWidth = texture.image?.naturalWidth || texture.image?.videoWidth || texture.image?.width || 1;
        const imageHeight = texture.image?.naturalHeight || texture.image?.videoHeight || texture.image?.height || 1;
        const imageAspect = Math.max(imageWidth, 1) / Math.max(imageHeight, 1);
        const depth = clamp(projection.near * 2.75, 2.5, 12);

        let planeWidth = (2 * depth) / projection.xScale;
        let planeHeight = (2 * depth) / projection.yScale;
        const frustumAspect = planeWidth / Math.max(planeHeight, 1e-6);
        if (imageAspect > frustumAspect) {
          planeHeight = planeWidth / imageAspect;
        } else {
          planeWidth = planeHeight * imageAspect;
        }

        const planeGroup = new THREE.Group();
        planeGroup.name = `${imageNode.name}_projection`;

        const frame = new THREE.Mesh(
          new THREE.PlaneGeometry(planeWidth * 1.04, planeHeight * 1.04),
          new THREE.MeshBasicMaterial({
            color: 0x15110d,
            transparent: true,
            opacity: 0.78,
            side: THREE.DoubleSide,
            depthWrite: false,
          }),
        );
        frame.position.z = -depth - 0.015;
        planeGroup.add(frame);

        const plate = new THREE.Mesh(
          new THREE.PlaneGeometry(planeWidth, planeHeight),
          new THREE.MeshBasicMaterial({
            map: texture,
            transparent: true,
            side: THREE.DoubleSide,
            toneMapped: false,
            depthWrite: false,
          }),
        );
        plate.position.z = -depth;
        planeGroup.add(plate);

        const outline = new THREE.LineSegments(
          new THREE.EdgesGeometry(new THREE.PlaneGeometry(planeWidth * 1.01, planeHeight * 1.01)),
          new THREE.LineBasicMaterial({
            color: 0xf5e8ca,
            transparent: true,
            opacity: 0.55,
          }),
        );
        outline.position.z = -depth + 0.002;
        planeGroup.add(outline);

        return planeGroup;
      }

      function queueImageContentLoad(node, group, runtimeScene, pendingTextureLoads) {
        const bufferPath = readTensorBufferPath(node.edge.content);
        if (!bufferPath || typeof runtimeScene.getBuffer !== "function") {
          return;
        }

        const buffer = runtimeScene.getBuffer(bufferPath);
        if (!buffer || typeof buffer.format !== "string" || !buffer.format.startsWith("image/")) {
          return;
        }

        const lensNode = node.parentName ? runtimeScene.getNode(node.parentName) : null;
        const imageSpace = readTensorString(node.edge.unpose);
        if (imageSpace && imageSpace !== "pixel_index_from_unit_viewport") {
          return;
        }
        const loadPromise = loadTextureFromSceneBuffer(buffer)
          .then((texture) => {
            const projection = createImageProjection(texture, lensNode, node);
            group.add(projection);
          })
          .catch((error) => {
            console.warn(`Unable to load image buffer "${buffer.path}"`, error);
          });

        pendingTextureLoads.push(loadPromise);
      }

      function buildMeshFromContent(content, label) {
        if (!content || typeof content.child !== "function") {
          return null;
        }

        const verticesTensor = content.child("vertices");
        const indicesTensor = content.child("indices");
        if (!verticesTensor || !indicesTensor) {
          return null;
        }

        const vertices = readTensorNumbers(verticesTensor);
        const indices = readTensorNumbers(indicesTensor);
        if (vertices.length === 0 || indices.length === 0) {
          return null;
        }

        const geometry = new THREE.BufferGeometry();
        const positionAttribute = new THREE.Float32BufferAttribute(vertices, 3);
        if (geometry.setAttribute) {
          geometry.setAttribute("position", positionAttribute);
        } else {
          geometry.addAttribute("position", positionAttribute);
        }
        geometry.setIndex(indices);
        geometry.computeVertexNormals();
        geometry.computeBoundingSphere();

        const mesh = new THREE.Mesh(
          geometry,
          new THREE.MeshPhongMaterial({
            color: 0xddd0b4,
            shininess: 35,
            specular: 0x2c241b,
            flatShading: false,
          }),
        );
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        mesh.name = label || "mesh";
        return mesh;
      }

      function buildRuntimeNode(node, runtimeScene, pendingTextureLoads, ancestry = new Set()) {
        const group = new THREE.Group();
        group.name = node.name;

        if (node.edge.pose) {
          applyPose(group, node.edge.pose);
        }

        const mesh = buildMeshFromContent(node.edge.content, node.name);
        if (mesh) {
          group.add(mesh);
        }

        queueImageContentLoad(node, group, runtimeScene, pendingTextureLoads);

        const nextAncestry = new Set(ancestry);
        nextAncestry.add(node.name);

        for (const childNode of runtimeScene.getChildNodes(node)) {
          if (nextAncestry.has(childNode.name)) {
            continue;
          }
          group.add(buildRuntimeNode(childNode, runtimeScene, pendingTextureLoads, nextAncestry));
        }

        return group;
      }

      function extractCameraSpec(runtimeScene) {
        const cameraNode = runtimeScene.getNode("camera");
        const lensNode = cameraNode ? runtimeScene.getChildNodes(cameraNode)[0] ?? null : null;

        const projectionMatrix = lensNode ? matrixFromRuntimePose(lensNode.edge.unpose) : new THREE.Matrix4();
        const projection = extractProjectionMetrics(projectionMatrix);

        return {
          cameraNode,
          lensNode,
          fov: projection.fov,
          near: projection.near,
          far: projection.far,
        };
      }

      function frameSurface() {
        clearObjectChildren(surfaceGroup);

        const size = sceneBounds.getSize(new THREE.Vector3());
        const span = Math.max(size.x, size.z, 12);
        const gridSize = Math.max(Math.ceil(span / 10) * 10 + 10, 30);
        const y = Number.isFinite(sceneBounds.min.y) ? sceneBounds.min.y - 0.15 : -0.15;

        const grid = new THREE.GridHelper(gridSize, Math.max(Math.round(gridSize / 5), 6), 0x5b6a63, 0x9eb0a7);
        grid.position.set(sceneCenter.x, y, sceneCenter.z);
        grid.material.opacity = 0.45;
        grid.material.transparent = true;
        surfaceGroup.add(grid);

        const plane = new THREE.Mesh(
          new THREE.CircleGeometry(gridSize * 0.9, 48),
          new THREE.MeshBasicMaterial({
            color: 0xf0eadb,
            transparent: true,
            opacity: 0.62,
          }),
        );
        plane.rotation.x = -Math.PI / 2;
        plane.position.set(sceneCenter.x, y - 0.01, sceneCenter.z);
        surfaceGroup.add(plane);

        const axes = new THREE.AxesHelper(Math.max(sceneRadius * 0.4, 8));
        axes.position.copy(sceneCenter);
        surfaceGroup.add(axes);
      }

      function configureCamera(runtimeScene) {
        const cameraSpec = extractCameraSpec(runtimeScene);
        const aspect = Math.max(viewport.clientWidth, 1) / Math.max(viewport.clientHeight, 1);
        camera.fov = cameraSpec.fov;
        camera.near = cameraSpec.near;
        camera.far = cameraSpec.far;
        camera.aspect = aspect;
        camera.updateProjectionMatrix();

        if (cameraSpec.cameraNode && cameraSpec.cameraNode.edge.pose) {
          applyPose(camera, cameraSpec.cameraNode.edge.pose);
        } else {
          camera.position.set(sceneCenter.x + sceneRadius * 1.8, sceneCenter.y + sceneRadius * 1.2, sceneCenter.z + sceneRadius * 1.8);
          camera.lookAt(sceneCenter);
        }

        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
        const toCenter = sceneCenter.clone().sub(camera.position);
        const viewDistance = Math.max(toCenter.dot(forward), sceneRadius * 0.75, 6);
        const target = camera.position.clone().addScaledVector(forward, viewDistance);

        controls.setView(camera.position.clone(), target);
        initialViewState = {
          position: camera.position.clone(),
          target: target.clone(),
        };
      }

      function formatCommitLabel(runtime, commitId) {
        const commits = runtime.getOrderedCommits();
        const commitIndex = commits.findIndex((commit) => commit.commitId === commitId);
        const commit = commits[commitIndex];
        if (!commit) {
          return "missing commit";
        }
        const source = sceneSourceByCommitId.get(commit.commitId);
        const displayLabel = source ? source.label : commit.commitId;
        return `${displayLabel} (${commitIndex + 1}/${commits.length})`;
      }

      function updateTimelineUi(runtime) {
        const commits = runtime.getOrderedCommits();
        const activeCommitId = runtime.activeCommit.commitId;
        const activeIndex = Math.max(
          commits.findIndex((commit) => commit.commitId === activeCommitId),
          0,
        );
        commitSliderElement.disabled = commits.length <= 1;
        commitSliderElement.min = "0";
        commitSliderElement.max = String(Math.max(commits.length - 1, 0));
        commitSliderElement.value = String(activeIndex);
        commitLabelElement.textContent = formatCommitLabel(runtime, activeCommitId);
      }

      function updateSceneMetrics(runtime, bufferBytes) {
        const runtimeScene = runtime.activeScene;
        worldRoot.updateMatrixWorld(true);
        sceneBounds = new THREE.Box3().setFromObject(worldRoot);
        if (sceneBounds.isEmpty()) {
          sceneBounds = new THREE.Box3(
            new THREE.Vector3(-10, -10, -10),
            new THREE.Vector3(10, 10, 10),
          );
        }
        sceneCenter = sceneBounds.getCenter(new THREE.Vector3());
        sceneRadius = Math.max(sceneBounds.getSize(new THREE.Vector3()).length() * 0.35, 10);

        const boardNode = runtimeScene.getNode("board");
        const stoneCount = boardNode ? boardNode.edge.childNodeNames.length : 0;
        const meshStone = runtimeScene.getNode("mesh_stone");
        const meshVerticesTensor = meshStone?.edge.content?.child("vertices");
        const bufferCount = runtimeScene.buffersByPath.size;
        const commitCount = runtime.getOrderedCommits().length;
        const vertexCount = meshVerticesTensor
          ? Math.floor(readTensorNumbers(meshVerticesTensor).length / 3)
          : 0;

        sceneStatsElement.textContent = `${commitCount} commits · ${runtimeScene.nodesByName.size} nodes · ${stoneCount} stones · ${vertexCount} verts · ${bufferCount} buffers · ${bufferBytes} bytes`;
      }

      async function renderActiveCommit(resetView = true) {
        if (!activeRuntime) {
          return;
        }

        const renderToken = ++activeRenderToken;
        const runtimeScene = activeRuntime.activeScene;
        const pendingTextureLoads = [];

        updateTimelineUi(activeRuntime);
        clearObjectChildren(worldRoot);
        for (const rootNode of runtimeScene.getRootNodes()) {
          worldRoot.add(buildRuntimeNode(rootNode, runtimeScene, pendingTextureLoads));
        }

        updateSceneMetrics(activeRuntime, activeBufferBytes ? activeBufferBytes.length : 0);
        frameSurface();
        if (resetView) {
          configureCamera(runtimeScene);
        }

        const activeCommitLabel = formatCommitLabel(activeRuntime, activeRuntime.activeCommit.commitId);
        if (pendingTextureLoads.length > 0) {
          setStatus(`Showing ${activeCommitLabel}; streaming ${pendingTextureLoads.length} image buffer(s)...`, "loading");
          await Promise.allSettled(pendingTextureLoads);
          if (renderToken !== activeRenderToken) {
            return;
          }
        }
        setStatus(`Showing ${activeCommitLabel} from combined timeline packet`, "ready");
      }

      async function onTimelineScrub() {
        if (!activeRuntime) {
          return;
        }

        const commits = activeRuntime.getOrderedCommits();
        const nextIndex = clamp(
          Math.round(Number(commitSliderElement.value) || 0),
          0,
          Math.max(commits.length - 1, 0),
        );
        const nextCommit = commits[nextIndex];
        if (!nextCommit) {
          return;
        }

        if (activeRuntime.activeCommit.commitId === nextCommit.commitId) {
          updateTimelineUi(activeRuntime);
          return;
        }

        activeRuntime.setActiveCommit(nextCommit.commitId);
        await renderActiveCommit(true);
      }

      async function loadScene() {
        const timelinePaths = SCENE_SOURCES.map((source) => source.url).join(" -> ");
        scenePathElement.textContent = `timeline: ${timelinePaths}`;
        setStatus(`Loading ${SCENE_SOURCES.length} timeline commits...`, "loading");

        const responses = await Promise.all(
          SCENE_SOURCES.map((source) => fetch(source.url, { headers: { Accept: "application/json" } })),
        );
        for (let responseIndex = 0; responseIndex < responses.length; responseIndex += 1) {
          if (!responses[responseIndex].ok) {
            throw new Error(`HTTP ${responses[responseIndex].status} while fetching ${SCENE_SOURCES[responseIndex].url}`);
          }
        }

        const legacyCommits = await Promise.all(
          responses.map((response) => response.json()),
        );
        const runtimeFromJson = runtimeFromLegacyJsonSequence(
          legacyCommits.map((legacySceneJson, index) => ({
            sceneJson: legacySceneJson,
            commitId: SCENE_SOURCES[index].commitId,
            commitPreviousId: index > 0 ? SCENE_SOURCES[index - 1].commitId : "",
            commitInputId: index > 0 ? SCENE_SOURCES[index - 1].commitId : SCENE_SOURCES[index].commitId,
            createdAt: SCENE_SOURCES[index].createdAt,
            createdByModelId: "browser/viewcore",
          })),
        );

        activeBufferBytes = runtimeFromJson.toFlatbufferBuffer();
        activeRuntime = NDSceneRuntime.fromFlatbufferBuffer(activeBufferBytes);
        updateTimelineUi(activeRuntime);
        await renderActiveCommit(true);
      }

      function resetView() {
        if (!initialViewState) {
          return;
        }
        controls.setView(initialViewState.position.clone(), initialViewState.target.clone());
      }

      function frameSceneFromCurrentTarget() {
        const direction = new THREE.Vector3(1, 0.85, 1).normalize();
        const position = sceneCenter.clone().addScaledVector(direction, sceneRadius * 2.5);
        controls.setView(position, sceneCenter.clone());
      }

      function resize() {
        const width = viewport.clientWidth || window.innerWidth;
        const height = viewport.clientHeight || window.innerHeight;
        camera.aspect = width / Math.max(height, 1);
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
      }

      function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }

      controls = new BasicOrbitControls(camera, renderer.domElement, () => {});
      resetViewButton.addEventListener("click", resetView);
      frameSceneButton.addEventListener("click", frameSceneFromCurrentTarget);
      commitSliderElement.addEventListener("input", () => {
        onTimelineScrub().catch((error) => {
          console.error(error);
          setStatus(`Unable to scrub timeline: ${error.message}`, "error");
        });
      });
      window.addEventListener("resize", resize);

      resize();
      animate();

      loadScene().catch((error) => {
        console.error(error);
        setStatus(`Unable to load scene: ${error.message}`, "error");
        sceneStatsElement.textContent = "scene unavailable";
        commitLabelElement.textContent = "timeline unavailable";
        commitSliderElement.disabled = true;
        frameSurface();
        controls.setView(new THREE.Vector3(48, 42, 52), new THREE.Vector3(0, 0, 0));
      });
    </script>
  </body>
</html>
